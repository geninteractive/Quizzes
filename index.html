<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>2 Quiz MCUX</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Lato', Arial, sans-serif;
      background: transparent;
      padding: 20px;
    }

    /* ── PANTALLA INICIAL ── */
    .intro-box {
      text-align: center;
      padding: 10px 0 20px;
    }

    .intro-box h3 {
      font-size: 1.1em;
      color: #222;
      margin-bottom: 8px;
    }

    .intro-box p {
      font-size: 0.93em;
      color: #555;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .intro-options {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn-qty {
      background: #fff;
      border: 1.5px solid #5454E9;
      color: #5454E9;
      border-radius: 4px;
      padding: 10px 22px;
      font-size: 0.95em;
      font-weight: bold;
      cursor: pointer;
      font-family: 'Lato', Arial, sans-serif;
      transition: background 0.2s, color 0.2s;
    }

    .btn-qty:hover {
      background: #5454E9;
      color: #fff;
    }

    /* ── QUIZ ── */
    .progress-label {
      font-size: 0.75em;
      color: #888;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .question-text {
      font-size: 1em;
      color: #222;
      line-height: 1.6;
      margin-bottom: 20px;
      padding-left: 14px;
      border-left: 3px solid #5454E9;
      font-weight: bold;
    }

    .options-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 20px;
    }

   .option-btn {
  width: 100%;
  background: #fff;
  border: 1px solid #c8d0d8;
  border-radius: 4px;
  padding: 10px 16px;
  min-height: 48px;
  text-align: left;
  font-size: 0.95em;
  font-family: 'Lato', Arial, sans-serif;
  color: #333;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

    .option-btn:hover:not(:disabled) {
      border-color: #5454E9;
      background: #f0f0fd;
    }

    .option-btn.selected {
      border-color: #5454E9;
      background: #ebebfb;
      color: #3333b0;
      font-weight: bold;
    }

    .option-btn.correct {
      border-color: #2e7d32;
      background: #e8f5e9;
      color: #1b5e20;
      font-weight: bold;
    }

    .option-btn.incorrect {
      border-color: #c62828;
      background: #ffebee;
      color: #b71c1c;
      font-weight: bold;
    }

    .option-btn.dimmed {
      opacity: 0.4;
    }

    .option-btn:disabled {
      cursor: default;
    }

    .feedback-box {
      display: none;
      border-radius: 4px;
      padding: 10px 14px;
      font-size: 0.92em;
      line-height: 1.5;
      margin-bottom: 18px;
      border-left: 4px solid;
    }

    .feedback-box.correct {
      background: #e8f5e9;
      border-color: #2e7d32;
      color: #1b5e20;
      display: block;
    }

    .feedback-box.incorrect {
      background: #ffebee;
      border-color: #c62828;
      color: #b71c1c;
      display: block;
    }

    .btn-next {
      background: #5454E9;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 10px 20px;
      font-size: 0.92em;
      font-weight: bold;
      font-family: 'Lato', Arial, sans-serif;
      cursor: pointer;
      display: none;
      transition: background 0.2s;
    }

    .btn-next:hover {
      background: #3333b0;
    }

    /* ── PANTALLA FINAL ── */
    .results-box {
      padding: 10px 0 20px;
    }

    .results-box h3 {
      font-size: 1.1em;
      color: #222;
      margin-bottom: 16px;
    }

    .score-row {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    .score-card {
      flex: 1;
      border-radius: 4px;
      padding: 14px;
      text-align: center;
    }

    .score-card.good {
      background: #e8f5e9;
      border-left: 4px solid #2e7d32;
    }

    .score-card.bad {
      background: #ffebee;
      border-left: 4px solid #c62828;
    }

    .score-card .number {
      font-size: 2em;
      font-weight: bold;
      line-height: 1;
      margin-bottom: 4px;
    }

    .score-card.good .number { color: #2e7d32; }
    .score-card.bad .number  { color: #c62828; }

    .score-card .label {
      font-size: 0.8em;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .results-message {
      font-size: 0.95em;
      color: #444;
      line-height: 1.6;
      margin-bottom: 22px;
      padding: 14px 16px;
      background: #f0f0fd;
      border-left: 4px solid #5454E9;
      border-radius: 4px;
    }

    .btn-retry {
      background: #5454E9;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 11px 24px;
      font-size: 0.95em;
      font-weight: bold;
      font-family: 'Lato', Arial, sans-serif;
      cursor: pointer;
      transition: background 0.2s;
      display: block;
      width: 100%;
    }

    .btn-retry:hover {
      background: #3333b0;
    }



.btn-confirmar {
  display: none;
  background: #5454E9;
  color: #fff;
  border: none;
  border-radius: 4px;
  padding: 5px 11px;
  font-size: 0.82em;
  font-weight: bold;
  font-family: 'Lato', Arial, sans-serif;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: background 0.2s;
}
.btn-confirmar:hover { background: #3333b0; }

    
  </style>
</head>

  <div id="modalOverlay" style="display:none; position:fixed; inset:0; align-items:center; justify-content:center; z-index:100;">
  <div style="background:#fff; border-radius:6px; padding:24px 24px 20px; width:90%; max-width:420px; box-shadow:0 4px 24px rgba(0,0,0,0.13); border-top:4px solid #5454E9;">
    <div id="modalFeedback" style="font-size:0.95em; line-height:1.6; margin-bottom:18px; padding:10px 14px; border-radius:4px; border-left:4px solid;"></div>
    <div style="display:flex; justify-content:flex-end;">
      <button id="btnNext" onclick="nextQuestion()" style="background:#5454E9; color:#fff; border:none; border-radius:4px; padding:10px 20px; font-size:0.92em; font-weight:bold; font-family:'Lato',Arial,sans-serif; cursor:pointer;">Siguiente →</button>
    </div>
  </div>
</div>
  
<body>
<div id="quiz"></div>
<script>
  const params = new URLSearchParams(window.location.search);
  const TAG = params.get("tag") || "ux-basico";

  let NUM_QUESTIONS = 3;
  let current = 0;
  let correctCount = 0;
  let incorrectCount = 0;
  let selectedQuestions = [];
  let selectedOption = null;
  let answered = false;
  let allQuestions = [];

  fetch('questions.json')
    .then(res => res.json())
    .then(data => {
      allQuestions = data.filter(q => q.tag === TAG);
      showIntro();
    });

  // ── PANTALLA INICIAL ──
  function showIntro() {
    const available = allQuestions.length;
    const options = [3, 5, 10, 20].filter(n => n <= available);

    document.getElementById("quiz").innerHTML = `
      <div class="intro-box">
        <h3>¿Cuánto sabes de este tema? 🎯</h3>
        <p>Elige cuántas preguntas quieres enfrentar.<br>A más preguntas, mayor el reto.</p>
        <div class="intro-options">
          ${options.map(n => `
            <button class="btn-qty" onclick="startQuiz(${n})">${n} preguntas</button>
          `).join('')}
        </div>
      </div>
    `;
  }

  // ── INICIAR QUIZ ──
  function startQuiz(n) {
    NUM_QUESTIONS = n;
    current = 0;
    correctCount = 0;
    incorrectCount = 0;
    selectedQuestions = allQuestions
      .sort(() => 0.5 - Math.random())
      .slice(0, NUM_QUESTIONS);
    showQuestion();
  }

  // ── PREGUNTA ──
function showQuestion() {
    selectedOption = null;
    answered = false;
    document.getElementById("modalOverlay").style.display = "none";

    const q = selectedQuestions[current];
    const container = document.getElementById("quiz");

  container.innerHTML = `
  <p class="progress-label">Pregunta ${current + 1} de ${NUM_QUESTIONS}</p>
  <p class="question-text">📌 ${q.question}</p>
  <ul class="options-list">
    ${q.options.map((opt, i) => `
      <li>
        <div class="option-btn" id="opt-${i}" onclick="selectOption(${i})">
          <span>${opt}</span>
          <button class="btn-confirmar" id="confirm-${i}" onclick="event.stopPropagation(); checkAnswer()">Confirmar ✓</button>
        </div>
      </li>
    `).join('')}
  </ul>
`;

   
}

function selectOption(index) {
    if (answered) return;
    selectedOption = index;

    document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('selected'));
    document.querySelectorAll('.btn-confirmar').forEach(btn => btn.style.display = 'none');

    document.getElementById(`opt-${index}`).classList.add('selected');
    document.getElementById(`confirm-${index}`).style.display = 'inline-block';
}

 function checkAnswer() {
    if (selectedOption === null || answered) return;
    answered = true;

    const q = selectedQuestions[current];
    const isCorrect = selectedOption === q.correct;

    if (isCorrect) correctCount++; else incorrectCount++;

    document.querySelectorAll('.option-btn').forEach((el, i) => {
  el.onclick = null;
  el.classList.remove('selected');
  if (i === q.correct) el.classList.add('correct');
  else if (i === selectedOption && !isCorrect) el.classList.add('incorrect');
  else el.classList.add('dimmed');
});

    const feedback = document.getElementById("modalFeedback");
    feedback.textContent = isCorrect ? q.feedback.correct : q.feedback.incorrect;
    feedback.style.background = isCorrect ? "#e8f5e9" : "#ffebee";
    feedback.style.borderColor = isCorrect ? "#2e7d32" : "#c62828";
    feedback.style.color = isCorrect ? "#1b5e20" : "#b71c1c";

    const btnNext = document.getElementById('btnNext');
    btnNext.textContent = current === NUM_QUESTIONS - 1 ? 'Ver resultados →' : 'Siguiente →';

    const overlay = document.getElementById("modalOverlay");
    overlay.style.display = "flex";
}

function nextQuestion() {
    document.getElementById("modalOverlay").style.display = "none";
    current++;
    if (current < NUM_QUESTIONS) {
      showQuestion();
    } else {
      showResults();
    }
}

  // ── PANTALLA FINAL ──
  function showResults() {
    const ratio = correctCount / NUM_QUESTIONS;
    let message = "";
    let showRetry = NUM_QUESTIONS < 20;

    if (ratio >= 0.75) {
      message = "¡Muy bien! Dominas el tema con soltura. Sigue así, ese nivel de preparación marca la diferencia. 💪";
    } else if (ratio >= 0.5) {
      message = "Vas por buen camino, pero todavía hay margen para mejorar. Vuélvelo a intentar y verás cómo subes el puntaje. 🔄";
    } else {
      message = "Parece que este tema merece una revisión más detallada. Repasa los contenidos de la unidad y vuelve cuando te sientas listo. 📖";
    }

    const retryBlock = showRetry ? `
      <p style="font-size:0.88em; color:#777; margin-bottom:12px; text-align:center;">
        ¿Quieres seguir practicando? Inténtalo de nuevo con una nueva selección de preguntas.
      </p>
      <button class="btn-retry" onclick="window.location.reload()">Volver a intentarlo 🔁</button>
    ` : `
      <button class="btn-retry" onclick="window.location.reload()">Repetir evaluación completa 🔁</button>
    `;

    document.getElementById("quiz").innerHTML = `
      <div class="results-box">
        <h3>Resultados</h3>
        <div class="score-row">
          <div class="score-card good">
            <div class="number">${correctCount}</div>
            <div class="label">Correctas</div>
          </div>
          <div class="score-card bad">
            <div class="number">${incorrectCount}</div>
            <div class="label">Incorrectas</div>
          </div>
        </div>
        <div class="results-message">${message}</div>
        ${retryBlock}
      </div>
    `;
  }
</script>
