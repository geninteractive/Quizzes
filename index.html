<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Quiz UX</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Lato', Arial, sans-serif;
      background: transparent;
      padding: 20px;
    }

    .progress-label {
      font-size: 0.75em;
      color: #888;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .question-text {
      font-size: 1em;
      color: #222;
      line-height: 1.6;
      margin-bottom: 20px;
      padding-left: 14px;
      border-left: 3px solid #5454E9;
      font-weight: bold;
    }

    .options-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 20px;
    }

    .option-btn {
      width: 100%;
      background: #fff;
      border: 1px solid #c8d0d8;
      border-radius: 4px;
      padding: 12px 16px;
      text-align: left;
      font-size: 0.95em;
      color: #333;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .option-btn:hover:not(:disabled) {
      border-color: #5454E9;
      background: #f0f0fd;
    }

    .option-btn.selected {
      border-color: #5454E9;
      background: #ebebfb;
      color: #3333b0;
      font-weight: bold;
    }

    .option-btn.correct {
      border-color: #2e7d32;
      background: #e8f5e9;
      color: #1b5e20;
      font-weight: bold;
    }

    .option-btn.incorrect {
      border-color: #c62828;
      background: #ffebee;
      color: #b71c1c;
      font-weight: bold;
    }

    .option-btn.dimmed {
      opacity: 0.4;
    }

    .option-btn:disabled {
      cursor: default;
    }

    .feedback-box {
      display: none;
      border-radius: 4px;
      padding: 10px 14px;
      font-size: 0.92em;
      line-height: 1.5;
      margin-bottom: 18px;
      border-left: 4px solid;
    }

    .feedback-box.correct {
      background: #e8f5e9;
      border-color: #2e7d32;
      color: #1b5e20;
      display: block;
    }

    .feedback-box.incorrect {
      background: #ffebee;
      border-color: #c62828;
      color: #b71c1c;
      display: block;
    }

    .action-row {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .btn-check {
      background: #5454E9;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 10px 20px;
      font-size: 0.92em;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-check:hover:not(:disabled) {
      background: #3333b0;
    }

    .btn-check:disabled {
      background: #adb5bd;
      cursor: not-allowed;
    }

    .btn-next {
      background: #5454E9;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 10px 20px;
      font-size: 0.92em;
      font-weight: bold;
      cursor: pointer;
      display: none;
      transition: background 0.2s;
    }

    .btn-next:hover {
      background: #3333b0;
    }

    .completion-box {
      text-align: center;
      padding: 20px 0;
    }

    .completion-box h3 {
      font-size: 1.15em;
      color: #333;
      margin-bottom: 8px;
    }

    .completion-box p {
      color: #666;
      font-size: 0.93em;
    }
  </style>
</head>
<body>

<div id="quiz"></div>

<script>
const NUM_QUESTIONS = 3;
const TAG = "ux-basico";
let current = 0;
let selectedQuestions = [];
let selectedOption = null;
let answered = false;

fetch('questions.json')
  .then(res => res.json())
  .then(data => {
    selectedQuestions = data
      .filter(q => q.tag === TAG)
      .sort(() => 0.5 - Math.random())
      .slice(0, NUM_QUESTIONS);
    showQuestion();
  });

  function showQuestion() {
    selectedOption = null;
    answered = false;

    const q = selectedQuestions[current];
    const container = document.getElementById("quiz");

    container.innerHTML = `
      <p class="progress-label">Pregunta ${current + 1} de ${NUM_QUESTIONS}</p>
      <p class="question-text">📌 ${q.question}</p>
      <ul class="options-list" id="optionsList">
        ${q.options.map((opt, i) => `
          <li>
            <button class="option-btn" id="opt-${i}" onclick="selectOption(${i})">${opt}</button>
          </li>
        `).join('')}
      </ul>
      <div id="feedback" class="feedback-box"></div>
      <div class="action-row">
        <button class="btn-check" id="btnCheck" onclick="checkAnswer()" disabled>Confirmar ✓</button>
        <button class="btn-next" id="btnNext" onclick="nextQuestion()">Siguiente →</button>
      </div>
    `;
  }

  function selectOption(index) {
    if (answered) return;
    selectedOption = index;

    document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('selected'));
    document.getElementById(`opt-${index}`).classList.add('selected');
    document.getElementById('btnCheck').disabled = false;
  }

  function checkAnswer() {
    if (selectedOption === null || answered) return;
    answered = true;

    const q = selectedQuestions[current];
    const feedback = document.getElementById("feedback");
    const isCorrect = selectedOption === q.correct;

    document.querySelectorAll('.option-btn').forEach((btn, i) => {
      btn.disabled = true;
      btn.classList.remove('selected');
      if (i === q.correct) {
        btn.classList.add('correct');
      } else if (i === selectedOption && !isCorrect) {
        btn.classList.add('incorrect');
      } else {
        btn.classList.add('dimmed');
      }
    });

    feedback.textContent = isCorrect ? q.feedback.correct : q.feedback.incorrect;
    feedback.className = `feedback-box ${isCorrect ? 'correct' : 'incorrect'}`;

    document.getElementById('btnCheck').style.display = 'none';
    const btnNext = document.getElementById('btnNext');
    btnNext.style.display = 'inline-block';
    if (current === NUM_QUESTIONS - 1) {
      btnNext.textContent = 'Finalizar ✓';
    }
  }

  function nextQuestion() {
    current++;
    if (current < NUM_QUESTIONS) {
      showQuestion();
    } else {
      document.getElementById("quiz").innerHTML = `
        <div class="completion-box">
          <h3>¡Autoevaluación completada! 🎉</h3>
          <p>Has respondido todas las preguntas. Continúa con el siguiente tema.</p>
        </div>
      `;
    }
  }
</script>
